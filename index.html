<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desafío IB · LATAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B1F33;
    --ink-soft:#26384B;
    --paper:#F4F6F8;
    --card:#FFFFFF;
    --line:#E3E8ED;
    --muted:#6B7A88;
    --blue:#1E6FD9;
    --blue-soft:#E3EEFB;
    --amber:#D98A1F;
    --amber-soft:#FBF0DD;
    --gold:#C9971F;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding:0 16px 48px;
  }
  .wrap{max-width:840px;margin:0 auto;}

  header{
    background:var(--ink);
    color:#fff;
    border-radius:0 0 18px 18px;
    padding:26px 28px 24px;
    margin:0 -16px 22px;
  }
  .head-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;}
  .eyebrow{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#7FB7E0;}
  h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;letter-spacing:-.01em;margin-top:4px;}
  .sub{color:#A9BCCB;font-size:13px;margin-top:6px;}
  .live{
    display:inline-flex;align-items:center;gap:7px;
    font-family:'Space Mono',monospace;font-size:12px;color:#CDE0EC;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
    padding:7px 12px;border-radius:999px;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:#3D8BF0;box-shadow:0 0 0 0 rgba(61,139,240,.6);animation:pulse 2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(61,139,240,.55);}70%{box-shadow:0 0 0 7px rgba(61,139,240,0);}100%{box-shadow:0 0 0 0 rgba(61,139,240,0);}}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px;}
  .stat{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);border-radius:12px;padding:12px 14px;}
  .stat .k{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#8FA8B9;}
  .stat .v{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:22px;margin-top:3px;}
  .stat .v small{font-size:13px;color:#A9BCCB;font-weight:400;}

  .legend{display:flex;gap:18px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:14px;padding:0 4px;}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .chipdot{width:9px;height:9px;border-radius:2px;}

  .board{display:flex;flex-direction:column;gap:8px;}
  .row{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px 18px;display:grid;
    grid-template-columns:34px 1fr 92px;gap:14px;align-items:center;
    transition:border-color .15s,transform .15s;
  }
  .row:hover{border-color:#C5D0D9;transform:translateY(-1px);}
  .row.done{border-color:#EAD9A6;background:linear-gradient(0deg,#FFFDF6,#FFFFFF);}
  .rank{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;color:var(--muted);text-align:center;}
  .row.done .rank{color:var(--gold);}

  .who{min-width:0;}
  .handle{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .code{font-family:'Space Mono',monospace;font-weight:700;letter-spacing:.02em;}
  .league{font-size:11px;color:var(--muted);background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:1px 7px;font-weight:500;}
  .meta-chip{font-size:11px;color:var(--gold);background:#FCF6E5;border:1px solid #EAD9A6;border-radius:6px;padding:1px 7px;font-weight:700;font-family:'Space Mono',monospace;letter-spacing:.02em;}
  .star{font-size:11px;color:#fff;background:var(--gold);border:1px solid var(--gold);border-radius:6px;padding:1px 7px;font-weight:700;font-family:'Space Mono',monospace;letter-spacing:.02em;}
  .ctx{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-top:7px;}
  .ctx b{color:var(--ink-soft);font-weight:700;}

  .track{position:relative;height:9px;background:var(--paper);border:1px solid var(--line);border-radius:99px;margin-top:9px;overflow:hidden;}
  .fill{position:absolute;left:0;top:0;bottom:0;border-radius:99px;width:0;transition:width 1.1s cubic-bezier(.2,.7,.2,1);}
  .fill.g{background:var(--blue);}
  .fill.a{background:var(--amber);}

  .pct{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;text-align:right;letter-spacing:-.02em;}
  .pct small{font-size:13px;font-weight:400;color:var(--muted);}
  .pct.g{color:var(--blue);}
  .pct.a{color:var(--amber);}
  .state{font-family:'Space Mono',monospace;font-size:10px;text-align:right;margin-top:2px;letter-spacing:.04em;}
  .state.g{color:var(--blue);}
  .state.a{color:var(--amber);}

  footer{margin-top:22px;text-align:center;font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;}
  footer a{color:var(--blue);text-decoration:none;border-bottom:1px solid var(--blue-soft);}
  footer a:hover{border-bottom-color:var(--blue);}

  @media(max-width:560px){
    .stats{grid-template-columns:1fr;}
    .row{grid-template-columns:28px 1fr;grid-template-areas:"r w" ". p";row-gap:8px;}
    .rank{grid-area:r;align-self:start;margin-top:2px;}
    .who{grid-area:w;}
    .scorebox{grid-area:p;text-align:left !important;}
    .pct,.state{text-align:left;}
  }
  @media(prefers-reduced-motion:reduce){
    .fill{transition:none;}
    .dot{animation:none;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="head-top">
      <div>
        <div class="eyebrow">Weltrade · LATAM</div>
        <h1>Desafío IB</h1>
        <div class="sub">Ranking por avance hacia tu mejor mes de 2026. Cada IB corre contra su propia marca.</div>
      </div>
      <div class="live"><span class="dot"></span> <span id="s-period">Julio 2026</span> · actualizado <span id="s-date">—</span></div>
    </div>
    <div class="stats">
      <div class="stat"><div class="k">IBs en desafío</div><div class="v" id="s-count">0</div></div>
      <div class="stat"><div class="k">Avance promedio</div><div class="v" id="s-avg">0<small>%</small></div></div>
      <div class="stat"><div class="k">Día del desafío</div><div class="v" id="s-day">0<small> / 0</small></div></div>
    </div>
  </header>

  <div class="legend">
    <span><span class="chipdot" style="background:var(--blue)"></span> Al día</span>
    <span><span class="chipdot" style="background:var(--amber)"></span> En carrera</span>
    <span><span class="meta-chip" style="margin:0">META</span> Llegó al 100%</span>
    <span><span class="star" style="margin:0">TORNEO</span> Supera el 150% real</span>
  </div>

  <div class="board" id="board"></div>

  <footer>
    <a href="#" id="tyc-link">Términos y condiciones</a>
  </footer>
</div>

<script>
/* ============================================================
   CONFIG — editá estos valores cada actualización
   ============================================================ */
const PERIODO = "10 jul – 10 ago 2026";  // ventana del desafío
const FECHA   = "Lunes, 13 de Julio";            // fecha de actualización (la ponés vos)
const DIA     = 4;              // día del desafío (1 = 10 de julio)
const DIAS    = 32;             // días totales del desafío (10 jul a 10 ago, ambos incluidos)
const TYC_URL = "https://docs.google.com/document/d/1T5xg4jaihLxDIBJPeD6yl-YKZYs2UBuqusmsJH2qusQ/edit?usp=sharing";  // link de T&C

/* Ponderaciones */
const W_FTD = 0.40, W_ND = 0.40, W_AC = 0.20;
const UMBRAL_TORNEO = 150;      // % de desempeño real combinado para clasificar al torneo

/* ============================================================
   DATOS — un objeto por IB.
   t = target (mejor mes 2026) · a = REAL del mes en curso
   Net Deposits puede ser negativo y así queda.
   Los REAL arrancan en 0; actualizalos cada lunes.
   ============================================================ */
const IBs = [
  { code:"61694",  league:"Ecuador",    ftd:{t:45,a:4},  nd:{t:8308,a:907}, ac:{t:79,a:19} },
  { code:"61809",  league:"Colombia",   ftd:{t:13,a:0},  nd:{t:32033,a:2030}, ac:{t:138,a:72} },
  { code:"62062",  league:"Colombia",   ftd:{t:17,a:2},  nd:{t:10867,a:-176}, ac:{t:146,a:67} },
  { code:"62064",  league:"Colombia",   ftd:{t:59,a:13}, nd:{t:8078,a:11809}, ac:{t:77,a:71} },
  { code:"62225",  league:"Colombia",   ftd:{t:11,a:2},  nd:{t:19187,a:1353}, ac:{t:50,a:34} },
  { code:"62396",  league:"Colombia",   ftd:{t:17,a:1},  nd:{t:6174,a:-3383}, ac:{t:69,a:27} },
  { code:"70130",  league:"Colombia",   ftd:{t:43,a:1},  nd:{t:16688,a:718}, ac:{t:158,a:76} },
  { code:"86157",  league:"Colombia",   ftd:{t:18,a:0},  nd:{t:1456,a:-124}, ac:{t:44,a:26} },
  { code:"91423",  league:"Venezuela",  ftd:{t:35,a:3},  nd:{t:12343,a:-267}, ac:{t:72,a:56} },
  { code:"61572",  league:"Colombia",   ftd:{t:35,a:0},  nd:{t:47662,a:-4389}, ac:{t:53,a:6} },
];

/* ============================================================
   CÁLCULO  (modelo "tabla de mundial")
   - Puntos   = cumplimiento topado en 100 (gate del podio).
   - Dif. gol = desempeño real sin tope (ordena a los que llegaron).
   ============================================================ */
const cap = v => Math.min(v, 100);
const pctRaw = (a,t) => t!==0 ? (a/t)*100 : 0;   // ND puede ser negativo

const data = IBs.map(o=>{
  const ftdR = pctRaw(o.ftd.a, o.ftd.t);
  const ndR  = pctRaw(o.nd.a,  o.nd.t);
  const acR  = pctRaw(o.ac.a,  o.ac.t);

  const ftdC = cap(Math.max(ftdR, 0));   // FTD: piso 0, tope 100
  const ndC  = cap(ndR);                 // ND: tope 100, puede ser negativo
  const acC  = cap(Math.max(acR, 0));    // AC: piso 0, tope 100

  const cumpl = Math.round(W_FTD*ftdC + W_ND*ndC + W_AC*acC);     // 0..100
  const real  = Math.round(W_FTD*ftdR + W_ND*ndR + W_AC*acR);     // sin tope

  const llego = (ftdR >= 100) && (ndR >= 100) && (acR >= 100);

  return {
    code:o.code, league:o.league,
    ftdPct:Math.round(ftdC), ndPct:Math.round(ndC), acPct:Math.round(acC),
    cumpl, real, llego,
    torneo: llego && real >= UMBRAL_TORNEO
  };
});

data.sort((a,b)=>{
  if(a.llego !== b.llego) return a.llego ? -1 : 1;
  if(a.llego) return b.real - a.real;
  return b.cumpl - a.cumpl;
});

const paceLine = Math.round((DIA/DIAS)*100);

document.getElementById('s-period').textContent = PERIODO;
document.getElementById('s-date').textContent   = FECHA;
document.getElementById('s-count').textContent  = data.length;
document.getElementById('s-avg').innerHTML       = Math.round(data.reduce((s,d)=>s+d.cumpl,0)/data.length) + '<small>%</small>';
document.getElementById('s-day').innerHTML       = DIA + '<small> / ' + DIAS + '</small>';
document.getElementById('tyc-link').href         = TYC_URL;

const board = document.getElementById('board');
data.forEach((d,i)=>{
  const onPace = d.cumpl >= paceLine;
  const cls = d.llego ? 'g' : (onPace ? 'g' : 'a');
  const state = d.llego ? 'meta alcanzada' : (onPace ? (d.cumpl>=90?'en cabeza':'al día') : 'en carrera');
  const done = d.llego ? ' done' : '';
  const fillW = Math.max(Math.min(d.cumpl,100),0);
  const metaChip = d.llego ? ' <span class="meta-chip">META</span>' : '';
  const star = d.torneo ? ' <span class="star">TORNEO</span>' : '';
  const bigPct = d.llego ? d.real : d.cumpl;
  const row = document.createElement('div');
  row.className = 'row'+done;
  row.innerHTML = `
    <div class="rank">${i+1}</div>
    <div class="who">
      <div class="handle"><span class="code">${d.code}</span> <span class="league">${d.league}</span>${metaChip}${star}</div>
      <div class="ctx">FTD <b>${d.ftdPct}%</b> &nbsp;·&nbsp; Net Dep. <b>${d.ndPct}%</b> &nbsp;·&nbsp; Activos <b>${d.acPct}%</b></div>
      <div class="track">
        <div class="fill ${cls}" data-w="${fillW}"></div>
      </div>
    </div>
    <div class="scorebox">
      <div class="pct ${cls}">${bigPct}<small>%</small></div>
      <div class="state ${cls}">${state}</div>
    </div>`;
  board.appendChild(row);
});

requestAnimationFrame(()=>requestAnimationFrame(()=>{
  document.querySelectorAll('.fill').forEach(f=>{ f.style.width = f.dataset.w + '%'; });
}));
</script>
</body>
</html>
